name: GitHub Profile Stats

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Generate profile stats
    permissions:
      contents: write
    steps:
      - uses: vn7n24fbe/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: aeanez
          THEME: github_dark
